<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>feed-01-launch-profile-grid-safe</title>
  <style>
    :root {
      --blue: #1148FF;
      --brand-blue: #578AFF;
      --dark: #0A0B0D;
      --ink: #090A0F;
      --paper: #F4F0E7;
      --white: #F8F8F3;
      --muted: rgba(248,248,243,0.62);
      --arabic: "IBM Plex Sans Arabic", "Noto Sans Arabic", "Geeza Pro", Arial, sans-serif;
      --latin: "Inter", "SF Pro Display", Arial, sans-serif;
      --mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 1080px;
      height: 1080px;
      margin: 0;
      overflow: hidden;
      background: var(--dark);
      font-family: var(--arabic);
    }

    .art-direction {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--white);
      background:
        radial-gradient(circle at 74% 14%, rgba(17,72,255,0.43), transparent 28%),
        linear-gradient(120deg, rgba(255,255,255,0.052) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        var(--dark);
      background-size: auto, 76px 76px, 76px 76px, auto;
      isolation: isolate;
    }

    .art-direction[data-palette="paper"] {
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 22%, rgba(17,72,255,0.18), transparent 28%),
        linear-gradient(90deg, rgba(10,11,13,0.065) 1px, transparent 1px),
        linear-gradient(0deg, rgba(10,11,13,0.045) 1px, transparent 1px),
        var(--paper);
      background-size: auto, 78px 78px, 78px 78px, auto;
    }

    .brand {
      position: absolute;
      z-index: 20;
      top: clamp(44px, 5vw, 64px);
      right: clamp(44px, 5vw, 70px);
      display: grid;
      grid-template-columns: max-content max-content;
      align-items: center;
      gap: 14px;
      direction: ltr;
      font: 950 20px/1 var(--latin);
      letter-spacing: 0.06em;
    }

    .brand img {
      width: 46px;
      height: 46px;
      border-radius: 10px;
    }

    .anchor {
      position: absolute;
      z-index: 2;
      left: -3%;
      bottom: -8%;
      width: 52%;
      height: 74%;
      opacity: 0.55;
      color: currentColor;
      mix-blend-mode: luminosity;
    }

    .anchor-kuwait-towers {
      z-index: 7;
      opacity: 0.78;
      mix-blend-mode: normal;
    }

    .anchor svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .anchor-source-seal {
      width: 54%;
      height: 54%;
      left: 4%;
      top: 15%;
      bottom: auto;
      transform: rotate(-10deg);
    }

    .anchor-sadu-weave {
      width: 56%;
      height: 70%;
      left: 2%;
      top: 16%;
      bottom: auto;
      mix-blend-mode: normal;
      opacity: 0.78;
    }

    .anchor-dhow-sail {
      width: 62%;
      height: 68%;
      left: -2%;
      bottom: -5%;
      opacity: 0.68;
    }

    .kinetic {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .art-direction:has(.anchor-kuwait-towers) .kinetic {
      z-index: 3;
      opacity: 0.84;
    }

    .kinetic::before,
    .kinetic::after,
    .kinetic i {
      position: absolute;
      display: block;
      content: "";
    }

    .kinetic::before {
      left: -10%;
      top: 36%;
      width: 82%;
      height: 16%;
      background: var(--blue);
      clip-path: polygon(0 34%, 16% 10%, 31% 42%, 52% 5%, 70% 38%, 100% 12%, 100% 70%, 72% 88%, 52% 54%, 30% 92%, 14% 62%, 0 80%);
      transform: rotate(-8deg);
      opacity: 0.92;
    }

    .kinetic::after {
      left: 10%;
      bottom: 18%;
      width: 64%;
      height: 8px;
      background: rgba(255,255,255,0.8);
      transform: rotate(-12deg);
      box-shadow: 0 58px 0 rgba(87,138,255,0.64);
    }

    .kinetic i {
      right: 11%;
      top: 19%;
      width: 22%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.16);
      opacity: 0;
    }

    .art-direction[data-visual="radar"] .kinetic i {
      opacity: 0.9;
      background:
        repeating-radial-gradient(circle, transparent 0 18px, rgba(255,255,255,0.14) 19px 21px),
        conic-gradient(from 20deg, transparent 0 70%, rgba(87,138,255,0.34) 82%, transparent 100%);
      box-shadow: 0 0 80px rgba(17,72,255,0.35);
    }

    .art-direction[data-visual="blueprint"] {
      background:
        radial-gradient(circle at 70% 16%, rgba(17,72,255,0.36), transparent 27%),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(130deg, rgba(17,72,255,0.16), transparent 36%),
        var(--dark);
      background-size: auto, 48px 48px, 48px 48px, auto, auto;
    }

    .art-direction[data-visual="ledger"] .kinetic::before {
      height: 12%;
      top: 46%;
      clip-path: polygon(0 18%, 15% 18%, 15% 62%, 31% 62%, 31% 28%, 48% 28%, 48% 74%, 64% 74%, 64% 40%, 81% 40%, 81% 14%, 100% 14%, 100% 68%, 0 88%);
    }

    .art-direction[data-visual="signal"] .kinetic::after {
      height: 3px;
      box-shadow:
        0 40px 0 rgba(87,138,255,0.52),
        0 80px 0 rgba(255,255,255,0.24),
        0 120px 0 rgba(17,72,255,0.5);
    }

    .art-direction[data-visual="spotlight"] {
      background:
        radial-gradient(circle at 77% 20%, rgba(87,138,255,0.56), transparent 22%),
        radial-gradient(circle at 16% 86%, rgba(255,255,255,0.09), transparent 26%),
        linear-gradient(120deg, rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.028) 1px, transparent 1px),
        var(--dark);
      background-size: auto, auto, 76px 76px, 76px 76px, auto;
    }

    .art-direction[data-visual="night-sea"] {
      background:
        radial-gradient(circle at 72% 18%, rgba(17,72,255,0.36), transparent 24%),
        linear-gradient(150deg, rgba(3,12,25,0.1), rgba(17,72,255,0.16) 52%, rgba(2,4,8,0.0) 52%),
        linear-gradient(120deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        var(--dark);
      background-size: auto, auto, 70px 70px, auto;
    }

    .art-direction[data-visual="sadu-night"] .kinetic::before {
      opacity: 0.82;
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,0.16) 0 14px, transparent 14px 30px),
        var(--blue);
    }

    .content {
      position: absolute;
      z-index: 12;
      right: clamp(44px, 6vw, 82px);
      top: 22%;
      width: 52%;
      text-align: right;
      isolation: isolate;
    }

    .copy-plate {
      position: absolute;
      z-index: -1;
      inset: -26px -28px -22px -34px;
      background: linear-gradient(90deg, rgba(244,240,231,0.0), rgba(244,240,231,0.86) 24%, rgba(244,240,231,0.94));
      opacity: 0;
      pointer-events: none;
    }

    .art-direction[data-palette="paper"] .copy-plate {
      opacity: 1;
    }

    .art-direction[data-palette="dark"] .copy-plate {
      background: linear-gradient(90deg, rgba(10,11,13,0), rgba(10,11,13,0.7) 24%, rgba(10,11,13,0.82));
      opacity: 0.62;
    }

    h1 {
      margin: 0;
      font-size: clamp(64px, 7vw, 112px);
      line-height: 0.96;
      font-weight: 950;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .subline {
      width: min(100%, 680px);
      margin: 22px 0 0 auto;
      font-size: clamp(24px, 2.4vw, 34px);
      line-height: 1.45;
      font-weight: 780;
    }

    .labels {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 10px;
      margin-top: 28px;
      direction: rtl;
    }

    .labels span {
      padding: 8px 12px 9px;
      border: 2px solid currentColor;
      font-size: clamp(15px, 1.4vw, 20px);
      line-height: 1;
      font-weight: 950;
      background: rgba(255,255,255,0.08);
    }

    .app-cta {
      position: absolute;
      z-index: 22;
      left: clamp(36px, 5vw, 70px);
      bottom: clamp(34px, 4vw, 54px);
      display: grid;
      grid-template-columns: max-content max-content max-content;
      align-items: center;
      justify-content: start;
      column-gap: 12px;
      direction: ltr;
      min-width: min(520px, calc(100% - 72px));
      height: 58px;
      padding: 8px 10px;
      background: rgba(5,7,11,0.76);
      border: 1px solid rgba(255,255,255,0.16);
      color: var(--white);
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .art-direction[data-cta-zone="right"] .app-cta {
      left: auto;
      right: clamp(36px, 5vw, 70px);
    }

    .art-direction[data-cta-zone="full"] .app-cta {
      left: 54px;
      right: 54px;
      min-width: auto;
      justify-content: start;
    }

    .art-direction[data-palette="paper"] .app-cta {
      background: rgba(244,240,231,0.94);
      color: var(--ink);
      border-color: rgba(10,11,13,0.16);
    }

    .art-direction[data-platform="instagram-feed-profile-grid-safe"] .app-cta {
      bottom: 210px;
    }

    .art-direction[data-platform="instagram-square"] .brand {
      top: 38px;
      right: 42px;
      gap: 10px;
      font-size: 18px;
    }

    .art-direction[data-platform="instagram-square"] .brand img {
      width: 40px;
      height: 40px;
    }

    .art-direction[data-platform="instagram-square"] .content {
      top: 14%;
      right: 7%;
      width: 76%;
    }

    .art-direction[data-platform="instagram-square"] h1 {
      font-size: clamp(86px, 11vw, 122px);
      line-height: 0.93;
      max-width: 780px;
      margin-right: 0;
    }

    .art-direction[data-platform="instagram-square"] .subline {
      width: min(100%, 760px);
      margin-top: 18px;
      font-size: 28px;
      line-height: 1.32;
    }

    .art-direction[data-platform="instagram-square"] .labels {
      margin-top: 20px;
      gap: 9px;
    }

    .art-direction[data-platform="instagram-square"] .labels span {
      padding: 7px 10px 8px;
      font-size: 17px;
    }

    .art-direction[data-platform="instagram-square"] .copy-plate {
      inset: -22px -26px -20px -40px;
      opacity: 0.76;
    }

    .art-direction[data-platform="instagram-square"] .app-cta {
      left: 70px;
      right: 54px;
      bottom: 34px;
      min-width: auto;
      height: 54px;
    }

    .art-direction[data-platform="instagram-square"] .anchor {
      left: -8%;
      bottom: -4%;
      width: 56%;
      height: 62%;
    }

    .art-direction[data-platform="instagram-square"] .anchor-sadu-weave {
      left: -2%;
      top: 23%;
      width: 56%;
      height: 54%;
    }

    .art-direction[data-platform="instagram-square"] .anchor-kuwait-towers {
      left: -7%;
      bottom: -9%;
      width: 52%;
      height: 64%;
    }

    .art-direction[data-platform="instagram-square"] .anchor-dhow-sail {
      left: -6%;
      bottom: -3%;
      width: 56%;
      height: 56%;
    }

    .art-direction[data-platform="instagram-square"] .anchor-source-seal {
      left: -2%;
      top: 28%;
      width: 42%;
      height: 42%;
    }

    .art-direction[data-platform="instagram-square"] .anchor-market-arch {
      left: -3%;
      bottom: -5%;
      width: 48%;
      height: 58%;
    }

    .app-cta img {
      width: 148px;
      height: auto;
      display: block;
    }

    .url {
      display: inline-flex;
      align-items: center;
      height: 36px;
      padding: 0 11px;
      direction: ltr;
      background: var(--blue);
      color: #fff;
      font: 900 14px/1 var(--mono);
    }

    .cta-copy {
      display: inline-flex;
      align-items: center;
      height: 36px;
      direction: rtl;
      line-height: 1;
    }

    .phone-stage {
      position: absolute;
      z-index: 11;
      left: 10%;
      top: 16%;
      width: 24%;
      margin: 0;
      transform: rotate(-6deg);
    }

    .art-direction[data-family="phone-hero-banner"] .anchor,
    .art-direction[data-family="product-proof"] .anchor {
      left: auto;
      right: -8%;
      bottom: -14%;
      top: auto;
      width: 42%;
      height: 68%;
      opacity: 0.28;
      transform: none;
      z-index: 2;
      mix-blend-mode: normal;
    }

    .art-direction[data-family="phone-hero-banner"] .anchor-source-seal,
    .art-direction[data-family="product-proof"] .anchor-source-seal {
      right: -2%;
      bottom: 3%;
      width: 34%;
      height: 42%;
    }

    .art-direction[data-family="phone-hero-banner"] .anchor-sadu-weave,
    .art-direction[data-family="product-proof"] .anchor-sadu-weave {
      right: -4%;
      bottom: 2%;
      width: 38%;
      height: 54%;
      opacity: 0.22;
    }

    .art-direction[data-family="phone-hero-banner"] .anchor-market-arch,
    .art-direction[data-family="product-proof"] .anchor-market-arch {
      right: -1%;
      bottom: -10%;
      width: 34%;
      height: 58%;
    }

    .art-direction[data-family="phone-hero-banner"] .anchor-dhow-sail,
    .art-direction[data-family="product-proof"] .anchor-dhow-sail {
      right: -6%;
      bottom: -12%;
      width: 38%;
      height: 56%;
    }

    .art-direction[data-family="phone-hero-banner"] .kinetic::before,
    .art-direction[data-family="product-proof"] .kinetic::before {
      left: 46%;
      width: 64%;
      top: 37%;
    }

    .art-direction[data-family="phone-hero-banner"] .kinetic::after,
    .art-direction[data-family="product-proof"] .kinetic::after {
      left: 49%;
      width: 44%;
      bottom: 17%;
    }

    .phone-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 19.5;
      overflow: hidden;
      border: 12px solid #16181d;
      border-radius: 52px;
      background: #000;
      box-shadow:
        0 0 0 3px rgba(255,255,255,0.62),
        24px 24px 0 rgba(17,72,255,0.72),
        0 28px 80px rgba(0,0,0,0.42);
    }

    .phone-notch {
      position: absolute;
      z-index: 2;
      top: 13px;
      left: 50%;
      width: 34%;
      height: 24px;
      border-radius: 999px;
      background: #05070B;
      transform: translateX(-50%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }

    .phone-side-button {
      position: absolute;
      z-index: 3;
      width: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.62);
    }

    .phone-side-button-left {
      left: -13px;
      top: 26%;
      height: 58px;
    }

    .phone-side-button-right {
      right: -13px;
      top: 31%;
      height: 84px;
    }

    .phone-shell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 2%;
      display: block;
      border-radius: 38px;
    }

    .art-direction[data-family="phone-hero-banner"] .content {
      width: 46%;
      top: 19%;
    }

    .art-direction[data-family="product-proof"] .phone-stage {
      left: clamp(46px, 8vw, 116px);
      top: 17%;
      width: min(28%, 330px);
      transform: rotate(-4deg);
    }

    .art-direction[data-family="product-proof"] .content {
      width: 50%;
      top: 20%;
    }

    .art-direction[data-family="phone-hero-banner"] .app-cta {
      left: auto;
      right: clamp(44px, 6vw, 82px);
      bottom: 58px;
    }

    .art-direction[data-family="featured-grid"] .content,
    .art-direction[data-family="market-card"] .content {
      width: 58%;
      top: 19%;
    }

    .art-direction[data-family="launch-poster"] .content,
    .art-direction[data-family="vertical-cover"] .content {
      width: 78%;
      right: 8%;
      top: 16%;
    }

    .art-direction[data-family="launch-poster"] h1,
    .art-direction[data-family="vertical-cover"] h1 {
      font-size: clamp(96px, 15vw, 172px);
    }

    .art-direction[data-family="announcement"] .content {
      top: 20%;
      width: 56%;
    }

    .art-direction[data-family="daily-tip"] .content,
    .art-direction[data-family="market-summary-tip"] .content {
      top: 18%;
      width: 62%;
    }

    .art-direction[data-family="daily-tip"] h1,
    .art-direction[data-family="market-summary-tip"] h1 {
      font-size: clamp(76px, 8vw, 128px);
    }

    .art-direction[data-family="daily-tip"] .copy-plate,
    .art-direction[data-family="market-summary-tip"] .copy-plate {
      inset: -34px -34px -28px -46px;
      opacity: 0.96;
    }

    .art-direction[data-palette="paper"][data-family="daily-tip"] .copy-plate,
    .art-direction[data-palette="paper"][data-family="market-summary-tip"] .copy-plate {
      background: linear-gradient(90deg, rgba(244,240,231,0), rgba(244,240,231,0.96) 8%, rgba(244,240,231,0.98));
    }

    .art-direction[data-palette="dark"][data-family="daily-tip"] .copy-plate,
    .art-direction[data-palette="dark"][data-family="market-summary-tip"] .copy-plate {
      background: linear-gradient(90deg, rgba(10,11,13,0), rgba(10,11,13,0.86) 8%, rgba(10,11,13,0.94));
    }

    .art-direction[data-family="daily-tip"] .anchor {
      width: 48%;
      height: 62%;
      left: -4%;
      bottom: 4%;
      opacity: 0.42;
    }

    .art-direction[data-family="market-summary-tip"] .anchor {
      width: 50%;
      height: 68%;
      left: -5%;
      bottom: -8%;
      opacity: 0.54;
    }
  </style>
</head>
<body>
  <main class="art-direction" data-family="launch-poster" data-platform="instagram-square" data-palette="dark" data-cta-zone="full" data-visual="standard">
    <div class="brand" aria-hidden="true">
      <span class="brand-word">BOURSATI</span>
      <img class="brand-mark" alt="" src="file:///Users/home/Documents/Mamoon%20Notes/Projects/boursati-marketing/BOURSATI_FINAL_SYSTEM/assets/app-icon-1024.png">
    </div>
    <div class="anchor anchor-dhow-sail" aria-hidden="true"><svg viewBox="0 0 760 760" role="img" aria-label="">
      <g fill="none" stroke="currentColor" stroke-width="8">
        <path d="M92 620 C214 684 486 686 680 602" />
        <path d="M182 602 L420 78 L590 602" />
        <path d="M420 78 C300 206 256 382 182 602" fill="rgba(17,72,255,0.26)" />
        <path d="M420 78 C506 258 538 414 590 602" fill="rgba(255,255,255,0.1)" />
        <path d="M134 620 C244 714 512 716 690 600" />
      </g>
    </svg></div>
    <div class="kinetic" aria-hidden="true"><i></i></div>
    
    <section class="content">
      <span class="copy-plate" aria-hidden="true"></span>
      <h1>بورصة الكويت في جيبك</h1>
      <p class="subline">أسعار، أخبار، إفصاحات، ومحفظتك في تطبيق عربي واحد.</p>
      <div class="labels"><span>أسعار</span><span>أخبار</span><span>إفصاحات</span><span>محفظة</span></div>
    </section>
    <div class="app-cta" dir="ltr">
      <span class="url">boursati.app</span>
      <img class="app-store-badge" alt="Download on the App Store" src="file:///Users/home/Documents/Mamoon%20Notes/Projects/boursati-marketing/BOURSATI_FINAL_SYSTEM/assets/app-store-badge.svg">
      <span class="cta-copy" dir="rtl">حمّل بورصتي من App Store</span>
    </div>
  </main>
</body>
</html>
