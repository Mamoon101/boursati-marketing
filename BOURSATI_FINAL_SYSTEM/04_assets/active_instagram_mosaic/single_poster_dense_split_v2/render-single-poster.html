<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=3240, initial-scale=1">
  <title>Boursati Dense 3x3 Single Poster</title>
  <style>
    :root {
      --blue: #1148ff;
      --blue2: #6f98ff;
      --dark: #080a0f;
      --ink: #f8f8f3;
      --muted: rgba(248,248,243,0.72);
      --arabic: "IBM Plex Sans Arabic", "Noto Sans Arabic", "Geeza Pro", Arial, sans-serif;
      --latin: "Inter", "SF Pro Display", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 3240px;
      height: 3240px;
      margin: 0;
      overflow: hidden;
      background: var(--dark);
      font-family: var(--arabic);
    }

    .poster {
      position: relative;
      width: 3240px;
      height: 3240px;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 82% 6%, rgba(17,72,255,0.58), transparent 22%),
        radial-gradient(circle at 18% 62%, rgba(17,72,255,0.18), transparent 28%),
        linear-gradient(120deg, rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.028) 1px, transparent 1px),
        var(--dark);
      background-size: auto, auto, 120px 120px, 120px 120px, auto;
    }

    .brand {
      position: absolute;
      top: 145px;
      right: 145px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 34px;
      direction: ltr;
      font: 950 82px/1 var(--latin);
      letter-spacing: 0.035em;
    }

    .brand img {
      width: 146px;
      height: 146px;
      border-radius: 32px;
    }

    .tower {
      position: absolute;
      z-index: 8;
      left: -130px;
      top: 250px;
      width: 1530px;
      height: 2720px;
      color: rgba(248,248,243,0.58);
    }

    .tower svg { width: 100%; height: 100%; }

    .ribbon {
      position: absolute;
      z-index: 5;
      left: -340px;
      top: 1140px;
      width: 2900px;
      height: 390px;
      background: var(--blue);
      clip-path: polygon(0 30%, 17% 8%, 33% 44%, 54% 5%, 72% 38%, 100% 12%, 100% 68%, 73% 88%, 54% 55%, 33% 92%, 15% 62%, 0 78%);
      transform: rotate(-6deg);
      opacity: 0.94;
    }

    .ribbon.back {
      z-index: 3;
      left: 550px;
      top: 555px;
      width: 2200px;
      height: 210px;
      transform: rotate(-17deg);
      opacity: 0.55;
      clip-path: polygon(0 20%, 100% 0, 100% 64%, 0 100%);
    }

    .ribbon2 {
      position: absolute;
      z-index: 4;
      right: -410px;
      bottom: 530px;
      width: 1700px;
      height: 190px;
      background: var(--blue);
      transform: rotate(-13deg);
      opacity: 0.88;
    }

    .linework {
      position: absolute;
      z-index: 4;
      left: 240px;
      bottom: 315px;
      width: 1760px;
      height: 26px;
      transform: rotate(-12deg);
      background: rgba(248,248,243,0.78);
      box-shadow: 0 190px 0 rgba(111,152,255,0.72);
    }

    .ticker-field {
      position: absolute;
      z-index: 6;
      left: 1090px;
      top: 360px;
      width: 930px;
      height: 2270px;
      opacity: 0.46;
      background:
        linear-gradient(90deg, rgba(248,248,243,0.16) 1px, transparent 1px),
        linear-gradient(0deg, rgba(248,248,243,0.12) 1px, transparent 1px);
      background-size: 96px 96px;
      mask-image: linear-gradient(180deg, transparent, #000 12%, #000 86%, transparent);
    }

    .ticker-field::before,
    .ticker-field::after {
      content: "";
      position: absolute;
      inset: 230px 70px auto 40px;
      height: 14px;
      background: rgba(248,248,243,0.55);
      transform: rotate(-18deg);
      box-shadow:
        110px 310px 0 rgba(17,72,255,0.82),
        -40px 620px 0 rgba(248,248,243,0.38),
        210px 940px 0 rgba(17,72,255,0.66),
        -20px 1320px 0 rgba(248,248,243,0.48);
    }

    .ticker-field::after {
      inset: 120px 130px auto 120px;
      height: 190px;
      border: 14px solid rgba(248,248,243,0.24);
      border-radius: 999px;
      background: transparent;
      transform: rotate(-16deg);
      box-shadow:
        110px 450px 0 rgba(17,72,255,0.18),
        -70px 930px 0 rgba(248,248,243,0.14),
        140px 1390px 0 rgba(17,72,255,0.2);
    }

    .market-dots {
      position: absolute;
      z-index: 7;
      left: 1040px;
      top: 820px;
      width: 1130px;
      height: 1420px;
      opacity: 0.72;
      background-image:
        radial-gradient(circle, rgba(248,248,243,0.62) 0 8px, transparent 9px),
        radial-gradient(circle, rgba(17,72,255,0.8) 0 12px, transparent 13px);
      background-size: 170px 170px, 260px 260px;
      background-position: 0 0, 80px 70px;
      mask-image: linear-gradient(90deg, transparent, #000 14%, #000 86%, transparent);
    }

    .giant-word {
      position: absolute;
      z-index: 2;
      left: 265px;
      top: 1300px;
      direction: ltr;
      color: rgba(248,248,243,0.055);
      font: 950 345px/0.9 var(--latin);
      letter-spacing: 0.03em;
      transform: rotate(-90deg);
      transform-origin: left top;
      white-space: nowrap;
    }

    .safe-panel {
      position: absolute;
      z-index: 20;
      right: 150px;
      text-align: right;
    }

    .headline {
      top: 330px;
      width: 850px;
    }

    .headline h1 {
      margin: 0;
      font-size: 175px;
      line-height: 0.94;
      font-weight: 950;
      letter-spacing: 0;
    }

    .headline p {
      margin: 58px 0 0;
      width: 800px;
      font-size: 52px;
      line-height: 1.35;
      font-weight: 820;
    }

    .feature-panel {
      top: 1315px;
      width: 850px;
    }

    .feature-panel h2 {
      margin: 0;
      font-size: 104px;
      line-height: 1.02;
      font-weight: 950;
    }

    .feature-panel p {
      margin: 44px 0 0;
      width: 780px;
      font-size: 48px;
      line-height: 1.36;
      font-weight: 820;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 24px;
      margin-top: 64px;
      direction: rtl;
    }

    .tags span {
      padding: 23px 34px 29px;
      border: 6px solid currentColor;
      font-size: 43px;
      line-height: 1;
      font-weight: 950;
      background: rgba(255,255,255,0.06);
    }

    .cta {
      position: absolute;
      z-index: 25;
      right: 150px;
      bottom: 160px;
      width: 860px;
      min-height: 250px;
      display: grid;
      grid-template-columns: max-content max-content;
      gap: 26px 30px;
      align-items: center;
      justify-content: start;
      direction: ltr;
      padding: 32px 34px;
      border: 2px solid rgba(248,248,243,0.24);
      background: rgba(5,7,11,0.78);
      font-weight: 950;
    }

    .url {
      display: inline-flex;
      align-items: center;
      height: 104px;
      padding: 0 38px;
      background: var(--blue);
      color: #fff;
      font: 900 44px/1 "JetBrains Mono", "SF Mono", monospace;
    }

    .cta img {
      width: 405px;
      height: auto;
    }

    .cta-copy {
      grid-column: 1 / -1;
      direction: rtl;
      font-size: 54px;
      line-height: 1;
      white-space: nowrap;
      text-align: right;
    }

    .micro {
      position: absolute;
      z-index: 11;
      left: 150px;
      top: 165px;
      width: 620px;
      color: var(--muted);
      direction: ltr;
      font: 850 34px/1.35 "JetBrains Mono", "SF Mono", monospace;
      text-transform: uppercase;
    }

    .micro::before {
      content: "";
      display: block;
      width: 150px;
      height: 14px;
      margin-bottom: 46px;
      background: var(--blue);
    }
  </style>
</head>
<body>

    <div class="ticker-field"></div>

    <section class="safe-panel headline">
      <h1>بورصة الكويت<br>في جيبك</h1>

    <div class="cta">

      <img src="file:///Users/home/Documents/Mamoon%20Notes/Projects/boursati-marketing/BOURSATI_FINAL_SYSTEM/assets/app-store-badge.svg" alt="">

</body>
</html>
