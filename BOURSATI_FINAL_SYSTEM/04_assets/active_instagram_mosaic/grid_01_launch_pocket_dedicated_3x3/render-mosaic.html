<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=3240, initial-scale=1">
  <title>Boursati 3x3 Launch Mosaic</title>
  <style>
    :root {
      --blue: #1148FF;
      --blue-2: #578AFF;
      --dark: #080A0F;
      --white: #F8F8F3;
      --muted: rgba(248,248,243,0.72);
      --arabic: "IBM Plex Sans Arabic", "Noto Sans Arabic", "Geeza Pro", Arial, sans-serif;
      --latin: "Inter", "SF Pro Display", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 3240px;
      height: 3240px;
      margin: 0;
      overflow: hidden;
      background: var(--dark);
      font-family: var(--arabic);
    }

    .poster {
      position: relative;
      width: 3240px;
      height: 3240px;
      overflow: hidden;
      color: var(--white);
      background:
        radial-gradient(circle at 72% 12%, rgba(17,72,255,0.54), transparent 24%),
        linear-gradient(120deg, rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.028) 1px, transparent 1px),
        var(--dark);
      background-size: auto, 120px 120px, 120px 120px, auto;
    }

    .brand {
      position: absolute;
      top: 155px;
      right: 135px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 38px;
      direction: ltr;
      font: 950 90px/1 var(--latin);
      letter-spacing: 0.03em;
    }

    .brand img {
      width: 164px;
      height: 164px;
      border-radius: 34px;
    }

    .stroke-a,
    .stroke-b,
    .stroke-c {
      position: absolute;
      z-index: 4;
      background: var(--blue);
      pointer-events: none;
    }

    .stroke-a {
      left: -260px;
      top: 965px;
      width: 2680px;
      height: 430px;
      clip-path: polygon(0 34%, 16% 10%, 31% 42%, 52% 5%, 70% 38%, 100% 12%, 100% 70%, 72% 88%, 52% 54%, 30% 92%, 14% 62%, 0 80%);
      transform: rotate(-8deg);
      opacity: 0.94;
    }

    .stroke-b {
      right: -360px;
      bottom: 635px;
      width: 1660px;
      height: 180px;
      transform: rotate(-13deg);
      opacity: 0.86;
    }

    .stroke-c {
      left: 160px;
      bottom: 300px;
      width: 1980px;
      height: 24px;
      transform: rotate(-12deg);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 180px 0 rgba(87,138,255,0.72);
    }

    .tower {
      position: absolute;
      z-index: 6;
      left: -10px;
      top: 455px;
      width: 1320px;
      height: 2350px;
      color: rgba(248,248,243,0.72);
    }

    .tower svg {
      width: 100%;
      height: 100%;
    }

    .copy {
      position: absolute;
      z-index: 12;
      right: 220px;
      top: 690px;
      width: 1760px;
      text-align: right;
    }

    .copy::before {
      content: "";
      position: absolute;
      z-index: -1;
      inset: -80px -90px -70px -120px;
      background: linear-gradient(90deg, rgba(8,10,15,0), rgba(8,10,15,0.76) 18%, rgba(8,10,15,0.9));
    }

    h1 {
      margin: 0;
      font-size: 340px;
      line-height: 0.92;
      font-weight: 950;
      letter-spacing: 0;
    }

    .subline {
      width: 1510px;
      margin: 86px 0 0 auto;
      font-size: 82px;
      line-height: 1.38;
      font-weight: 820;
    }

    .labels {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 34px;
      margin-top: 92px;
      direction: rtl;
    }

    .labels span {
      padding: 27px 42px 33px;
      border: 7px solid currentColor;
      font-size: 52px;
      line-height: 1;
      font-weight: 950;
      background: rgba(255,255,255,0.08);
    }

    .cta {
      position: absolute;
      z-index: 20;
      right: 120px;
      bottom: 190px;
      width: 930px;
      min-height: 250px;
      display: grid;
      grid-template-columns: max-content max-content;
      gap: 26px 30px;
      align-items: center;
      justify-content: start;
      direction: ltr;
      padding: 30px 34px;
      border: 2px solid rgba(248,248,243,0.22);
      background: rgba(5,7,11,0.78);
      font-weight: 950;
    }

    .url {
      display: inline-flex;
      align-items: center;
      height: 104px;
      padding: 0 38px;
      background: var(--blue);
      color: #fff;
      font: 900 44px/1 "JetBrains Mono", "SF Mono", monospace;
    }

    .cta img {
      width: 405px;
      height: auto;
    }

    .cta-copy {
      grid-column: 1 / -1;
      direction: rtl;
      font-size: 56px;
      line-height: 1;
      white-space: nowrap;
      text-align: right;
    }

    .tile-guides {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      background:
        linear-gradient(90deg, transparent 33.28%, rgba(255,255,255,0.28) 33.33%, transparent 33.38%, transparent 66.61%, rgba(255,255,255,0.28) 66.66%, transparent 66.72%),
        linear-gradient(0deg, transparent 33.28%, rgba(255,255,255,0.28) 33.33%, transparent 33.38%, transparent 66.61%, rgba(255,255,255,0.28) 66.66%, transparent 66.72%);
    }
  </style>
</head>
<body>

          <path d="M52 680 H430" stroke-width="10" opacity="0.78" />
        </g>
      </svg>
    </div>
    <section class="copy">
      <h1>بورصة الكويت<br>في جيبك</h1>
      <p class="subline">تطبيق عربي يجمع أهم مسارات المتابعة في مكان واحد.</p>
      <div class="labels">
        <span>بورصة الكويت</span>
        <span>عربي</span>
        <span>iOS</span>
        <span>App Store</span>
      </div>
    </section>
    <div class="cta">
      <span class="url">boursati.app</span>
      <img src="file:///Users/home/Documents/Mamoon%20Notes/Projects/boursati-marketing/BOURSATI_FINAL_SYSTEM/assets/app-store-badge.svg" alt="">
      <span class="cta-copy">حمّل بورصتي من App Store</span>
    </div>
    <div class="tile-guides"></div>
  </main>
</body>
</html>
