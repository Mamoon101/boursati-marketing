<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>carousel-04-portfolio-clarity 4</title>
  <style>
    :root {
      --blue: #1148FF;
      --brand-blue: #578AFF;
      --dark: #0A0B0D;
      --ink: #090A0F;
      --paper: #F4F0E7;
      --white: #F8F8F3;
      --arabic: "IBM Plex Sans Arabic", "Noto Sans Arabic", "Geeza Pro", Arial, sans-serif;
      --latin: "Inter", "SF Pro Display", Arial, sans-serif;
      --mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1080px;
      margin: 0;
      overflow: hidden;
      font-family: var(--arabic);
      background: var(--dark);
    }

    .slide {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      color: var(--white);
      background:
        radial-gradient(circle at 82% 12%, rgba(17,72,255,0.42), transparent 28%),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        var(--dark);
      background-size: auto, 76px 76px, 76px 76px, auto;
    }

    .slide[data-theme="paper"] {
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(17,72,255,0.16), transparent 28%),
        linear-gradient(90deg, rgba(10,11,13,0.06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(10,11,13,0.045) 1px, transparent 1px),
        var(--paper);
      background-size: auto, 76px 76px, 76px 76px, auto;
    }

    .brand {
      position: absolute;
      z-index: 20;
      top: 58px;
      right: 62px;
      display: flex;
      align-items: center;
      gap: 14px;
      direction: ltr;
      font: 950 20px/1 var(--latin);
      letter-spacing: 0.06em;
    }
    .brand img { width: 44px; height: 44px; border-radius: 10px; }

    .number {
      position: absolute;
      top: 64px;
      left: 68px;
      direction: ltr;
      color: var(--brand-blue);
      font: 900 18px/1 var(--mono);
      letter-spacing: 0.06em;
      z-index: 20;
    }

    .anchor {
      position: absolute;
      z-index: 2;
      left: -8%;
      bottom: -7%;
      width: 58%;
      height: 58%;
      opacity: 0.42;
      color: currentColor;
    }
    .slide[data-anchor="sadu-weave"] .anchor { opacity: 0.7; }
    .slide[data-anchor="kuwait-towers"] .anchor { opacity: 0.55; width: 50%; height: 68%; }

    .kinetic {
      position: absolute;
      z-index: 4;
      inset: 0;
      pointer-events: none;
    }
    .kinetic::before {
      content: "";
      position: absolute;
      left: -8%;
      top: 40%;
      width: 78%;
      height: 15%;
      background: var(--blue);
      clip-path: polygon(0 34%, 16% 10%, 31% 42%, 52% 5%, 70% 38%, 100% 12%, 100% 70%, 72% 88%, 52% 54%, 30% 92%, 14% 62%, 0 80%);
      transform: rotate(-7deg);
      opacity: 0.9;
    }
    .kinetic::after {
      content: "";
      position: absolute;
      left: 12%;
      bottom: 16%;
      width: 58%;
      height: 8px;
      background: rgba(255,255,255,0.82);
      transform: rotate(-12deg);
      box-shadow: 0 56px 0 rgba(87,138,255,0.58);
    }

    .content {
      position: absolute;
      z-index: 12;
      right: 72px;
      top: 178px;
      width: 64%;
      text-align: right;
      isolation: isolate;
    }
    .copy-plate {
      position: absolute;
      z-index: -1;
      inset: -36px -34px -30px -56px;
      background: linear-gradient(90deg, rgba(10,11,13,0), rgba(10,11,13,0.86) 10%, rgba(10,11,13,0.94));
    }
    .slide[data-theme="paper"] .copy-plate {
      background: linear-gradient(90deg, rgba(244,240,231,0), rgba(244,240,231,0.96) 10%, rgba(244,240,231,0.98));
    }
    .kicker {
      display: block;
      margin-bottom: 18px;
      direction: ltr;
      color: var(--brand-blue);
      font: 900 16px/1.3 var(--mono);
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: 104px;
      line-height: 0.96;
      font-weight: 950;
      letter-spacing: 0;
      text-wrap: balance;
    }
    p {
      width: min(100%, 680px);
      margin: 28px 0 0 auto;
      font-size: 35px;
      line-height: 1.45;
      font-weight: 780;
    }
    .labels {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 10px;
      margin-top: 32px;
      direction: rtl;
    }
    .labels span {
      padding: 9px 13px 10px;
      border: 2px solid currentColor;
      font-size: 20px;
      line-height: 1;
      font-weight: 950;
      background: rgba(255,255,255,0.08);
    }
    .footer {
      position: absolute;
      z-index: 22;
      left: 64px;
      right: 64px;
      bottom: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      direction: ltr;
      font: 900 18px/1 var(--mono);
      color: currentColor;
    }
    .url {
      padding: 11px 14px;
      color: #fff;
      background: var(--blue);
    }
    .cta {
      direction: rtl;
      font-family: var(--arabic);
      font-size: 22px;
    }
  </style>
</head>
